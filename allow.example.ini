# claudius ACL profiles – copy and adjust.
#
# Wire up with (in .env):
#   CLAUDIUS_ALLOW_FILE=/abs/path/to/allow.ini
#   CLAUDIUS_ALLOW_PROFILE=flutter       # which profile to merge on top of [default]
#
# Format: INI-like. Section names are profiles. The [default] profile is
# always included; the profile selected via CLAUDIUS_ALLOW_PROFILE is merged
# on top. *.anthropic.com:443/tcp is ALWAYS reachable (claudius adds it).
# DNS resolvers (CLAUDIUS_DNS) are auto-added – don't list them here.
#
# Each entry:   host-or-glob:PORT/proto        e.g. api.github.com:443/tcp
#   - host: exact, or wildcard like *.npmjs.org, or literal IP
#   - proto: tcp or udp
#   - TCP is filtered by SNI/Host (wildcards OK)
#   - UDP is resolved to IPs once at startup (no wildcards)
# # introduces a comment to end-of-line.

[default]
pypi.org:443/tcp
files.pythonhosted.org:443/tcp
generativelanguage.googleapis.com:443/tcp    # Gemini MCP

[flutter]
# Flutter SDK & pub.dev
*.flutter-io.cn:443/tcp
pub.dev:443/tcp
*.googleapis.com:443/tcp
storage.googleapis.com:443/tcp

[node]
registry.npmjs.org:443/tcp
*.npmjs.org:443/tcp

[data-science]
huggingface.co:443/tcp
*.huggingface.co:443/tcp
files.pythonhosted.org:443/tcp       # duplicated from default; harmless

[open]
# escape hatch – use sparingly
*:443/tcp
*:80/tcp
